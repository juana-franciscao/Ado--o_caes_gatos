<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Formulario de Adoção</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Formulario de Adoção</h2>
    <main>
        <form id="formuAdocao" method="" action="">

            <label for="nome">Digite seu nome completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome completo">

            <br><br>

            <label for="email">Digite seu email completo</label>
            <input type="email" id="email" placeholder="Digite seu email completo">

            <br><br>

            <label for="telefone">Digite seu telefone completo</label>
            <input type="tel" id="telefone" placeholder="Digite seu telefone completo">

            <br><br>

            <label for="cpf">Digite seu CPF completo</label>
            <input type="text" id="cpf" placeholder="Digite seu CPF completo">

            <br><br>

            <label for="idade">Digite sua idade</label>
            <input type="number" id="idade" placeholder="Digite sua idade">

            <br><br>

            <label for="cidade">Digite sua cidade</label>
            <input type="text" id="cidade" placeholder="Digite sua cidade">

            <br><br>

            <p>Escolha o tipo de moradia:</p>
            <select name="moradia" id="moradia">
                <option value="selecione">Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select>

            <br><br>

            <label for="espaço">Digite seu espaço amplo disponível para o animal?</label>
            <input type="radio" id="espaço" name="espaço" value="sim"> Sim
            <input type="radio" id="espaço" name="espaço" value="não"> Não

            <br><br>
            <label for="tempo">Digite seu tempo, em horas você está disponível para cuidar do animal?</label>
            <input type="number" id="tempo">

            <br><br>

            <label for="horas">Digite seu tempo, em horas, seu animal vai ficar sozinho:</label>
            <input type="number" id="tempo">

            <br><br>

            <label for="motivo">Digite seu motivo da adoção do animal:</label>
            <textarea name="motivo" id="motivo"></textarea>

            <br><br>

            <label for="permite">Em caso de moradia em apartamento, permite-se a moradia de animais?</label>
            <input type="checkbox" id="permite">

            <br><br>

            <label for="seguro">Se em caso de moradia em casa, seu quintal é seguro e apropriado para animais?</label>
            <input type="checkbox" id="seguro">

            <br><br>

            <label for="financeiro">Você tem condições de ter um animal?(pode mandar por email um comprovante de
                renda/carteira assinada?)</label>
            <input type="checkbox" id="financeiro">

            <br><br>

            <label for="impulso">Decidiu adotar hoje?</label>
            <input type="radio" id="impulso" name="impulso" value="sim"> Sim
            <input type="radio" id="impulso" name="impulso" value="não"> Não

            <br><br>

            <label for="termos">Aceita os termos de adoção?</label>
            <input type="radio" id="termos" name="termos" value="sim"> Sim
            <input type="radio" id="termos" name="termos" value="não"> Não

            <br><br>

            <label for="preferencia">Aceita os termos de adoção?</label>
            <input type="radio" id="preferencia" name="preferencia" value="sim"> Sim
            <input type="radio" id="preferencia" name="preferencia" value="não"> Não

            <br><br>

            <label for="preferencia">Digite aqui sua preferencia/observações sobre o animal:</label>
            <textarea name="preferencia" id="preferencia"></textarea>

            <br><br>

            <button type="submit">Enviar</button>

        </form>

    </main>
    <h3 id="resultado"> </h3>

    <script src="scripts/script.js"></script>


</body>

</html>
